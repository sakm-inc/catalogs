<!doctype html>

<head>

    :root {
      --ink: #15201b;
      --muted: #6a786f;
      --line: #dce8df;
      --green: #19a66a;
      --green-dark: #0b7b4c;
      --mint: #eefbf4;
      --yellow: #ffd166;
      --bg: #f7fbf8;
      --card: #ffffff;
      --shadow: 0 14px 34px rgba(31, 52, 39, 0.16);

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 0 minmax(0, 1fr);
    }

    .app.map-focus {
      grid-template-rows: auto minmax(280px, 40vh) minmax(0, 1fr);
    }

    .topbar {
      position: relative;
      z-index: 2;
      padding: 12px 12px 10px;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.94) 100%);
      border-bottom: 1px solid var(--line);
    }

    .brandrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--green), #38c7a1);
      box-shadow: 0 8px 18px rgba(25, 166, 106, 0.3);
      font-weight: 900;
      flex: 0 0 auto;
    }

    .brand h1 {
      font-size: 18px;
      line-height: 1.05;
      margin: 0;
      letter-spacing: 0;
    }

    .brand p {
      color: var(--muted);
      margin: 2px 0 0;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .near-btn {
      border: 0;
      background: var(--ink);
      color: #fff;
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }

    .searchrow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .searchrow input, .searchrow select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      min-height: 44px;
      padding: 0 12px;
      color: var(--ink);
      font-size: 15px;
      outline: none;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    }

    .searchrow select {
      width: 122px;
      font-weight: 700;
      color: var(--green-dark);
    }

    #map {
      width: 100%;
      min-height: 0;
      height: 0;
      z-index: 1;
      overflow: hidden;
    }

    .app.map-focus #map {
      min-height: 390px;
      height: auto;
    }

    .sheet {
      position: relative;
      z-index: 3;
      overflow: hidden;
      background: var(--card);
      border-top: 1px solid var(--line);
      box-shadow: 0 -12px 28px rgba(34, 49, 39, 0.08);
      display: flex;
      flex-direction: column;
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 8px;
      flex: 0 0 auto;
    }

    .summary strong {
      display: block;
      font-size: 16px;
    }

    .summary span {
      color: var(--muted);
      font-size: 12px;
    }

    .list {
      overflow: auto;
      padding: 0 12px 14px;
    }

    .sheet.show-detail .summary,
    .sheet.show-detail .list {
      display: none;
    }

    .card {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
      cursor: pointer;
    }

    .card:active {
      opacity: .86;
    }

    .photo {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      background-color: #dff7ea;
      background-position: center;
      background-size: cover;
      position: relative;
      overflow: hidden;
    }

    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,.28) 100%);
      pointer-events: none;
    }

    .card h2 {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 1.2;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {

      padding: 5px 7px;
      border-radius: 999px;
      background: var(--mint);
      color: var(--green-dark);
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions a, .actions button {
      border: 0;
      border-radius: 12px;
      min-height: 38px;
      display: grid;
      place-items: center;
      text-decoration: none;
      font-weight: 850;
      font-size: 13px;
      cursor: pointer;
    }

    .call { background: var(--green); color: #fff; }
    .detail { background: #f0f4f1; color: var(--ink); }

    .detail-panel {
      display: none;
      background: #f7fbf8;
      max-height: none;
      overflow: auto;
      padding: 12px;
      flex: 1 1 auto;
    }

    .detail-panel.open { display: block; }
    .backdrop {

      inset: 0;
      z-index: 9;
      background: rgba(14, 28, 20, 0.32);
      opacity: 0;
      pointer-events: none;

    .panel-head {

      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .panel-head h2 {

    }

    .detail-page {

    .detail-top {

    }

    .info-grid {

      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;

    .info {

    .info small {

    .section-title {

      font-size: 14px;
      font-weight: 950;
      color: var(--ink);
    }

    .detail-section {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdfb;
      padding: 10px;
      margin-bottom: 10px;
    }

    .detail-section p {
      margin: 0;
      color: #425047;
      font-size: 14px;
      line-height: 1.45;
    }

    .detail-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .detail-list li {
      color: #35443b;
      font-size: 13px;
      line-height: 1.35;
      padding-left: 16px;
      position: relative;
    }

    .detail-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    .services {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 8px 0 10px;
    }

    .primary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      position: sticky;
      bottom: 0;
      background: #fff;
      padding-top: 10px;
    }

    .primary-actions a, .primary-actions button {
      min-height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      text-decoration: none;
      font-weight: 900;
      border: 0;
      font-size: 13px;
    }

    .whatsapp { background: #e9fbef; color: #0b7b4c; }
    .maplink { background: #eef4ff; color: #2459b8; }

    .leaflet-control-attribution { font-size: 9px; }

    @media (min-width: 820px) {
      body { overflow: auto; }
      .app {
        min-height: 100vh;
        grid-template-columns: 430px 1fr;
        grid-template-rows: auto 1fr;
      }
      .topbar, .sheet { grid-column: 1; }
      #map { display: none; grid-column: 2; grid-row: 1 / span 2; min-height: 100vh; height: auto; }
      .app.map-focus #map { display: block; }
      .sheet { min-height: 0; }
      .detail-panel {
        width: 430px;
        border-radius: 20px;
      }
    }
  </style>
</head>

    let userPoint = null;
    const markers = new Map();
    const map = L.map("map", { zoomControl: false }).setView([40.392, 49.84], 12);
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      maxZoom: 20,
      attribution: "漏 OpenStreetMap 漏 CARTO"
    }).addTo(map);

    const icon = L.divIcon({
      className: "",
      html: '<div style="width:30px;height:30px;border-radius:12px;background:#19a66a;border:3px solid white;box-shadow:0 8px 18px rgba(0,0,0,.25);display:grid;place-items:center;color:white;font-weight:900;font-size:13px">B</div>',
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    const userIcon = L.divIcon({
      className: "",
      html: '<div style="width:22px;height:22px;border-radius:50%;background:#2f80ed;border:4px solid white;box-shadow:0 0 0 8px rgba(47,128,237,.18)"></div>',
      iconSize: [22, 22],
      iconAnchor: [11, 11]
    });

    function distanceKm(a, b) {
      if (!a || !b) return null;
      const r = 6371;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * r * Math.asin(Math.sqrt(h));
    }

    function formatDistance(km) {
      if (km === null) return "";
      if (km < 1) return `${Math.round(km * 1000)} m`;
      return `${km.toFixed(1)} km`;
    }

    function filteredItems() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const district = document.getElementById("district").value;
      return kindergartens
        .map(item => ({ ...item, distance: distanceKm(userPoint, item) }))
        .filter(item => !district || item.district === district)
        .filter(item => {
          const text = [item.name, item.district, item.address, item.price, item.ages, item.services.join(" ")].join(" ").toLowerCase();
          return !q || text.includes(q);
        })
        .sort((a, b) => {
          if (a.distance === null || b.distance === null) return a.name.localeCompare(b.name, "az");
          return a.distance - b.distance;
        });
    }

      if (markers.has(item.name)) return markers.get(item.name);
      const marker = L.marker([item.lat, item.lng], { icon }).addTo(map);
      marker.bindPopup(`<strong>${item.name}</strong><br>${item.price}<br>${item.address}`);
      marker.on("click", () => openPanel(item));
      markers.set(item.name, marker);
      return marker;
    }

    function render() {
      const items = filteredItems();
      markers.forEach((marker, key) => {
        if (!items.some(item => item.name === key)) map.removeLayer(marker);
      });
      items.forEach(item => markerFor(item).addTo(map));
      document.getElementById("countLabel").textContent = `${items.length} ba臒莽a`;
      document.getElementById("sortLabel").textContent = userPoint ? "S蓹n蓹 yax谋nl谋q 眉zr蓹 d眉z眉l眉b" : "Bak谋 眉zr蓹 n眉mun蓹 m蓹lumatlar";
      document.getElementById("list").innerHTML = items.map(item => `
        <article class="card" data-card-name="${item.name}">
          <div class="photo" style="background-image:url('${item.image}')"></div>
          <div>
            <h2>${item.name}</h2>
            <div class="meta">${item.district} 路 ${item.price}${item.distance !== null ? ` 路 ${formatDistance(item.distance)}` : ""}<br>${item.address}</div>
            <div class="tags">${item.services.slice(0, 3).map(service => `<span class="tag">${service}</span>`).join("")}</div>
            <div class="actions">
              <a class="call" href="tel:${item.phone}">Z蓹ng et</a>
              <button class="detail" type="button" data-name="${item.name}">Bax</button>
            </div>
          </div>
        </article>
      `).join("");
      document.querySelectorAll("[data-name]").forEach(button => {
        button.addEventListener("click", () => openPanel(kindergartens.find(item => item.name === button.dataset.name)));
      });
      document.querySelectorAll("[data-card-name]").forEach(card => {
        card.addEventListener("click", () => openPanel(kindergartens.find(item => item.name === card.dataset.cardName)));
      });
      document.querySelectorAll(".actions").forEach(actions => {
        actions.addEventListener("click", event => event.stopPropagation());
      });
    }

    function focusMap(item) {
      document.querySelector(".app").classList.add("map-focus");
      setTimeout(() => {
        map.invalidateSize();
        map.setView([item.lat, item.lng], 16);
        markerFor(item).openPopup();
      }, 180);
    }

    function showNearbyView() {
      closePanel();
      document.querySelector(".app").classList.add("map-focus");
      setTimeout(() => map.invalidateSize(), 180);
    }

    function detailValue(item, key, fallback) {
      return item[key] || fallback;
    }

    function listHtml(items) {
      return `<ul class="detail-list">${items.map(value => `<li>${value}</li>`).join("")}</ul>`;
    }

    function openPanel(item) {

      const groups = detailValue(item, "groups", `${item.ages} 眉莽眉n ya艧 qruplar谋`);
      const activity = detailValue(item, "activity", [
        "M蓹kt蓹b蓹 haz谋rl谋q v蓹 g眉nd蓹lik inki艧af m蓹艧臒蓹l蓹l蓹ri",
        "Oyun, r蓹sm, musiqi v蓹 sosial bacar谋q saatlar谋",
        "Ya艧a uy臒un fiziki aktivlik v蓹 istirah蓹t rejimi"
      ]);
      const certificates = detailValue(item, "certificates", [
        "D枚vl蓹t qeydiyyat谋 / f蓹aliyy蓹t s蓹n蓹di 眉莽眉n yer",
        "Sanitar-gigiyena uy臒unlu臒u 眉莽眉n yer",
        "M眉蓹llim v蓹 personal s蓹n蓹dl蓹ri 眉莽眉n yer"
      ]);
      const admission = detailValue(item, "admission", [
        "Valideyn m眉raci蓹ti v蓹 ba臒莽a il蓹 ilkin dan谋艧谋q",
        "U艧a臒谋n ya艧谋na uy臒un qrupun se莽ilm蓹si",
        "S蓹n蓹dl蓹r v蓹 枚d蓹ni艧 艧蓹rtl蓹ri ba臒莽a t蓹r蓹find蓹n t蓹sdiql蓹nir"
      ]);
      const safety = detailValue(item, "safety", [
        "Qapal谋 v蓹 n蓹zar蓹tli giri艧",
        "Valideynl蓹 g眉nd蓹lik 蓹laq蓹",
        "U艧aqlar 眉莽眉n t蓹hl眉k蓹siz oyun zonas谋"
      ]);
      const meals = detailValue(item, "meals", "G眉nd蓹lik yem蓹k menyusu ba臒莽adan al谋nacaq v蓹 burada g枚st蓹ril蓹c蓹k.");
      const staff = detailValue(item, "staff", "M眉蓹lliml蓹r, day蓹l蓹r v蓹 蓹lav蓹 m眉t蓹x蓹ssisl蓹r haqq谋nda m蓹lumat ayr谋ca 蓹lav蓹 olunacaq.");
      const wa = `https://wa.me/${item.phone.replace(/\D/g, "")}?text=${encodeURIComponent("Salam. " + item.name + " haqq谋nda m蓹lumat almaq ist蓹yir蓹m.")}`;
      document.getElementById("panel").innerHTML = `
        <div class="detail-page">
          <div class="detail-top">
            <div class="detail-kicker">Ba臒莽a m蓹lumat谋</div>
            <button class="back-btn" id="closePanel" type="button">茝sas s蓹hif蓹y蓹 qay谋t</button>
          </div>
          <div class="detail-card">
            <div class="detail-photo" style="background-image:url('${item.image}')"></div>
            <div class="panel-head">
              <div>
                <h2>${item.name}</h2>
                <div class="meta">${item.address}${item.distance !== null ? ` 路 ${formatDistance(item.distance)}` : ""}</div>
              </div>
            </div>
            <p class="meta" style="font-size:14px;color:#425047">${item.note}</p>
            <div class="info-grid">

              <div class="info"><small>Ya艧</small><strong>${item.ages}</strong></div>
              <div class="info"><small>陌艧 saat谋</small><strong>${item.hours}</strong></div>
              <div class="info"><small>Bo艧 yer</small><strong>${item.places}</strong></div>
              <div class="info"><small>U艧aq tutumu</small><strong>${capacity}</strong></div>
              <div class="info"><small>Qruplar</small><strong>${groups}</strong></div>
            </div>
            <div class="services">${item.services.map(service => `<span class="tag">${service}</span>`).join("")}</div>
            <div class="section-title">F蓹aliyy蓹t v蓹 proqram</div>
            <div class="detail-section">${listHtml(activity)}</div>
            <div class="section-title">Sertifikatlar v蓹 s蓹n蓹dl蓹r</div>
            <div class="detail-section">${listHtml(certificates)}</div>
            <div class="section-title">U艧aq nec蓹 yerl蓹艧dirilir</div>
            <div class="detail-section">${listHtml(admission)}</div>
            <div class="section-title">Yem蓹k</div>
            <div class="detail-section"><p>${meals}</p></div>
            <div class="section-title">M眉蓹llim v蓹 personal</div>
            <div class="detail-section"><p>${staff}</p></div>
            <div class="section-title">T蓹hl眉k蓹sizlik</div>
            <div class="detail-section">${listHtml(safety)}</div>
            <div class="primary-actions">
              <a class="call" href="tel:${item.phone}">Z蓹ng et</a>

      `;
      document.getElementById("panel").classList.add("open");

      document.getElementById("closePanel").addEventListener("click", closePanel);
      document.getElementById("showOnMap").addEventListener("click", () => focusMap(item));
    }

    function closePanel() {
      document.getElementById("panel").classList.remove("open");
      document.querySelector(".sheet").classList.remove("show-detail");
      document.querySelector(".app").classList.remove("map-focus");
      document.getElementById("backdrop").classList.remove("open");
    }

    document.getElementById("backdrop").addEventListener("click", closePanel);
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("district").addEventListener("change", render);
    document.getElementById("nearBtn").addEventListener("click", () => {
      showNearbyView();
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        userPoint = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        L.marker([userPoint.lat, userPoint.lng], { icon: userIcon }).addTo(map);
        map.setView([userPoint.lat, userPoint.lng], 14);
        render();
        setTimeout(() => map.invalidateSize(), 180);
      }, () => {
        userPoint = { lat: 40.395, lng: 49.84 };
        render();
        setTimeout(() => map.invalidateSize(), 180);
      }, { enableHighAccuracy: true, timeout: 6000 });
    });

    render();
  </script>
</body>
