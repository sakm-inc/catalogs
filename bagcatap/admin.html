<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ba臒莽aTap Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root { --green:#19a66a; --dark:#15201b; --line:#dce8df; --muted:#6a786f; --bg:#f7fbf8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, sans-serif; background:var(--bg); color:var(--dark); }
    header { position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid var(--line); padding:14px; }
    h1 { margin:0; font-size:22px; }
    p { margin:4px 0 0; color:var(--muted); }
    main { max-width:980px; margin:0 auto; padding:14px; display:grid; gap:14px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px; box-shadow:0 10px 24px rgba(31,52,39,.08); }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    label { display:grid; gap:5px; color:#405047; font-weight:800; font-size:13px; }
    input, textarea, select { width:100%; border:1px solid var(--line); border-radius:8px; min-height:42px; padding:9px 10px; font:inherit; background:#fff; }
    textarea { min-height:84px; resize:vertical; }
    .full { grid-column:1 / -1; }
    .checks { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
    .checks label { display:flex; grid-auto-flow:column; align-items:center; gap:8px; }
    button { border:0; border-radius:9px; min-height:42px; padding:0 14px; font-weight:900; cursor:pointer; }
    .primary { background:var(--green); color:#fff; }
    .secondary { background:#eef4f1; color:var(--dark); }
    .danger { background:#ffeded; color:#b42318; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .status { font-weight:900; color:var(--green); min-height:20px; }
    .list { display:grid; gap:10px; }
    .item { border:1px solid var(--line); border-radius:10px; padding:10px; display:grid; gap:8px; }
    .item strong { font-size:16px; }
    .meta { color:var(--muted); font-size:13px; line-height:1.35; }
    .badge { display:inline-flex; border-radius:99px; padding:4px 8px; background:#eefbf4; color:#0b7b4c; font-size:12px; font-weight:900; }
    .notice-preview { border:1px solid #bfe8d2; background:#eefbf4; border-radius:10px; padding:12px; display:grid; gap:4px; }
    .notice-preview strong { font-size:16px; }
    .map-tools { display:grid; gap:8px; }
    .admin-map { min-height:270px; border:1px solid var(--line); border-radius:10px; overflow:hidden; background:#eef4f1; }
    .coord-status { color:var(--muted); font-size:13px; font-weight:800; min-height:18px; }
    .leaflet-container { font:inherit; }
    @media (max-width:720px){ .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Ba臒莽aTap Admin</h1>
    <p>Ba臒莽a 蓹lav蓹 et, d眉z蓹lt, gizl蓹t v蓹 se莽ilmi艧 et</p>
  </header>
  <main>
    <section class="card">
      <div class="grid">
        <label class="full">Admin 艧ifr蓹si<input id="password" type="password" value="1234" autocomplete="current-password" /></label>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="secondary" id="loadBtn" type="button">Siyah谋n谋 yenil蓹</button>
        <a href="index.html?v=adminlive1" target="_blank"><button class="secondary" type="button">陌stifad蓹莽i s蓹hif蓹si</button></a>
      </div>
    </section>

    <section class="card">
      <h2 id="formTitle">Yeni ba臒莽a 蓹lav蓹 et</h2>
      <form id="form" class="grid">
        <input id="itemId" type="hidden" />
        <label>Ad<input id="name" required placeholder="M蓹s: Laylay U艧aq Ba臒莽as谋" /></label>
        <label>Rayon<input id="district" placeholder="M蓹s: Bin蓹q蓹di" /></label>
        <label class="full">脺nvan<input id="address" required placeholder="M蓹s: 茝c蓹mi Nax莽谋vani k眉莽蓹si, Bak谋" /></label>
        <label>Latitude<input id="lat" type="number" step="0.000001" placeholder="40.4168" /></label>
        <label>Longitude<input id="lng" type="number" step="0.000001" placeholder="49.8401" /></label>
        <div class="full map-tools">
          <div class="row">
            <button class="secondary" id="findAddressBtn" type="button">脺nvan谋 x蓹rit蓹d蓹 tap</button>
            <button class="secondary" id="centerMapBtn" type="button">Bak谋 m蓹rk蓹zin蓹 莽蓹k</button>
          </div>
          <div class="coord-status" id="coordStatus">脺nvan谋 yazanda x蓹rit蓹d蓹 avtomatik axtar谋lacaq.</div>
          <div id="adminMap" class="admin-map"></div>
        </div>
        <label>Telefon / WhatsApp<input id="phone" placeholder="+994552201202" /></label>
        <label>Qiym蓹t<input id="price" placeholder="370 AZN / ay" /></label>
        <label>Ya艧 qrupu<input id="ages" placeholder="2-6 ya艧" /></label>
        <label>陌艧 saat谋<input id="hours" placeholder="08:30 - 18:00" /></label>
        <label>Bo艧 yer<input id="places" placeholder="5 bo艧 yer" /></label>
        <label>U艧aq tutumu<input id="capacity" placeholder="35 u艧aq" /></label>
        <label>Qruplar<input id="groups" placeholder="2-3, 3-4, 4-6 ya艧" /></label>
        <label class="full">艦蓹kil URL<input id="image" placeholder="https://..." /></label>
        <label class="full">Q谋sa qeyd<textarea id="note"></textarea></label>
        <label class="full">Xidm蓹tl蓹r, verg眉ll蓹<textarea id="services" placeholder="Yem蓹k, Haz谋rl谋q, Kamera"></textarea></label>
        <label class="full">F蓹aliyy蓹t v蓹 proqram, h蓹r s蓹tird蓹 biri<textarea id="activity"></textarea></label>
        <label class="full">Sertifikatlar, h蓹r s蓹tird蓹 biri<textarea id="certificates"></textarea></label>
        <label class="full">U艧aq yerl蓹艧dirm蓹 qaydas谋<textarea id="admission"></textarea></label>
        <label class="full">Yem蓹k m蓹lumat谋<textarea id="meals"></textarea></label>
        <label class="full">M眉蓹llim v蓹 personal<textarea id="staff"></textarea></label>
        <label class="full">T蓹hl眉k蓹sizlik, h蓹r s蓹tird蓹 biri<textarea id="safety"></textarea></label>
        <div class="checks full">
          <label><input id="active" type="checkbox" checked /> Aktiv g枚r眉ns眉n</label>
          <label><input id="featured" type="checkbox" /> Se莽ilmi艧/yuxar谋da</label>
        </div>
        <div class="row full">
          <button class="primary" type="submit">Yadda saxla</button>
          <button class="secondary" id="resetBtn" type="button">T蓹mizl蓹</button>
        </div>
      </form>
      <div class="status" id="status"></div>
    </section>

    <section class="card">
      <h2>Bildiri艧 g枚nd蓹r</h2>
      <p>Buradan g枚nd蓹ril蓹n mesaj APK a莽谋q olanda v蓹 istifad蓹莽i t蓹tbiq蓹 gir蓹nd蓹 yuxar谋da g枚r眉n蓹c蓹k.</p>
      <form id="notifyForm" class="grid" style="margin-top:12px">
        <label>Ba艧l谋q<input id="notifyTitle" placeholder="M蓹s: Yeni ba臒莽a 蓹lav蓹 olundu" /></label>
        <label>Aktivlik
          <select id="notifyActive">
            <option value="true">Aktiv g枚st蓹r</option>
            <option value="false">Haz谋rla, amma g枚st蓹rm蓹</option>
          </select>
        </label>
        <label class="full">Mesaj<textarea id="notifyMessage" required placeholder="M蓹s: N蓹rimanovda yeni ba臒莽a 蓹lav蓹 olundu. 茝trafl谋 baxmaq 眉莽眉n t蓹tbiq蓹 daxil olun."></textarea></label>
        <div class="row full">
          <button class="primary" type="submit">Bildiri艧i g枚nd蓹r</button>
          <button class="secondary" id="loadNotificationsBtn" type="button">Bildiri艧l蓹ri yenil蓹</button>
        </div>
      </form>
      <div class="status" id="notifyStatus"></div>
      <div class="list" id="notificationsList" style="margin-top:12px"></div>
    </section>

    <section class="card">
      <h2>M枚vcud ba臒莽alar</h2>
      <div class="list" id="list"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API = "https://sat-chapel-division-observed.trycloudflare.com/api/bagcatap/kindergartens";
    const NOTIFICATION_API = "https://sat-chapel-division-observed.trycloudflare.com/api/bagcatap/notifications";
    const fields = ["name","district","address","lat","lng","phone","price","ages","hours","places","capacity","groups","image","note","services","activity","certificates","admission","meals","staff","safety"];
    let items = [];
    let notifications = [];
    let adminMap;
    let adminMarker;
    let geocodeTimer;
    const BAKU_CENTER = [40.4093, 49.8671];
    const $ = id => document.getElementById(id);
    const lines = value => String(value || "").split(/\n|,/).map(x => x.trim()).filter(Boolean);
    const multiline = value => Array.isArray(value) ? value.join("\n") : (value || "");
    const status = text => $("status").textContent = text;
    const notifyStatus = text => $("notifyStatus").textContent = text;
    const coordStatus = text => $("coordStatus").textContent = text;
    function password(){ return $("password").value.trim(); }
    function initAdminMap(){
      adminMap = L.map("adminMap", { scrollWheelZoom:false }).setView(BAKU_CENTER, 11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(adminMap);
      adminMap.on("click", event => {
        setMarker(event.latlng.lat, event.latlng.lng, 16);
        coordStatus("X蓹rit蓹d蓹n se莽il蓹n yer qeyd olundu.");
      });
    }
    function setMarker(lat, lng, zoom = 16){
      const latitude = Number(lat);
      const longitude = Number(lng);
      if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return;
      $("lat").value = latitude.toFixed(6);
      $("lng").value = longitude.toFixed(6);
      if (!adminMarker) {
        adminMarker = L.marker([latitude, longitude], { draggable:true }).addTo(adminMap);
        adminMarker.on("dragend", () => {
          const point = adminMarker.getLatLng();
          $("lat").value = point.lat.toFixed(6);
          $("lng").value = point.lng.toFixed(6);
          coordStatus("Markerin yeni yeri qeyd olundu.");
        });
      } else {
        adminMarker.setLatLng([latitude, longitude]);
      }
      adminMap.setView([latitude, longitude], zoom);
    }
    function clearMarker(){
      if (adminMarker) {
        adminMarker.remove();
        adminMarker = null;
      }
      if (adminMap) adminMap.setView(BAKU_CENTER, 11);
      coordStatus("脺nvan谋 yazanda x蓹rit蓹d蓹 avtomatik axtar谋lacaq.");
    }
    function updateMarkerFromInputs(){
      const lat = Number($("lat").value);
      const lng = Number($("lng").value);
      if (Number.isFinite(lat) && Number.isFinite(lng) && lat && lng) {
        setMarker(lat, lng, 16);
      }
    }
    function addressQuery(){
      const address = $("address").value.trim();
      const district = $("district").value.trim();
      if (!address || address.length < 4) return "";
      let query = [address, district].filter(Boolean).join(", ");
      if (!/(bak谋|baku|az蓹rbaycan|azerbaijan)/i.test(query)) query += ", Bak谋, Az蓹rbaycan";
      return query;
    }
    async function findAddress(manual = false){
      const query = addressQuery();
      if (!query) {
        if (manual) coordStatus("茝vv蓹lc蓹 k眉莽蓹 v蓹 ya 眉nvan yaz.");
        return;
      }
      coordStatus("脺nvan x蓹rit蓹d蓹 axtar谋l谋r...");
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=az&q=${encodeURIComponent(query)}`;
        const res = await fetch(url, { headers: { "Accept": "application/json" } });
        const result = (await res.json())[0];
        if (!result) {
          coordStatus("脺nvan tap谋lmad谋. 脺nvan谋 bir az daha d蓹qiq yaz v蓹 yenid蓹n yoxla.");
          return;
        }
        setMarker(Number(result.lat), Number(result.lon), 17);
        coordStatus("脺nvan tap谋ld谋 v蓹 x蓹rit蓹d蓹 i艧ar蓹l蓹ndi.");
      } catch (error) {
        coordStatus("脺nvan avtomatik tap谋lmad谋. X蓹rit蓹d蓹 yer蓹 bas谋b marker qoya bil蓹rs蓹n.");
      }
    }
    function scheduleAddressSearch(){
      clearTimeout(geocodeTimer);
      geocodeTimer = setTimeout(() => findAddress(false), 900);
    }
    function formData(){
      const data = { password: password(), active: $("active").checked, featured: $("featured").checked };
      fields.forEach(key => data[key] = $(key).value.trim());
      data.lat = Number(data.lat || 0);
      data.lng = Number(data.lng || 0);
      data.services = lines(data.services);
      data.activity = lines(data.activity);
      data.certificates = lines(data.certificates);
      data.admission = lines(data.admission);
      data.safety = lines(data.safety);
      return data;
    }
    function clearForm(){
      $("itemId").value = "";
      fields.forEach(key => $(key).value = "");
      $("active").checked = true;
      $("featured").checked = false;
      $("formTitle").textContent = "Yeni ba臒莽a 蓹lav蓹 et";
      clearMarker();
    }
    function editItem(id){
      const item = items.find(row => row.id === id);
      if (!item) return;
      $("itemId").value = item.id;
      fields.forEach(key => $(key).value = Array.isArray(item[key]) ? multiline(item[key]) : (item[key] || ""));
      $("active").checked = item.active !== false;
      $("featured").checked = !!item.featured;
      $("formTitle").textContent = "Ba臒莽an谋 d眉z蓹lt";
      updateMarkerFromInputs();
      window.scrollTo({top:0, behavior:"smooth"});
    }
    async function saveItem(event){
      event.preventDefault();
      const id = $("itemId").value;
      const res = await fetch(id ? `${API}/${encodeURIComponent(id)}` : API, {
        method: id ? "PATCH" : "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(formData())
      });
      if (!res.ok) { status("Yadda saxlanmad谋. 艦ifr蓹ni v蓹 xanalar谋 yoxla."); return; }
      status("Yadda saxland谋. APK v蓹 sayt avtomatik yenil蓹n蓹c蓹k.");
      clearForm();
      await loadItems();
    }
    async function deleteItem(id){
      if (!confirm("Bu ba臒莽a silinsin?")) return;
      const res = await fetch(`${API}/${encodeURIComponent(id)}?password=${encodeURIComponent(password())}`, { method:"DELETE" });
      status(res.ok ? "Silindi." : "Silinm蓹di. 艦ifr蓹ni yoxla.");
      await loadItems();
    }
    async function sendNotification(event){
      event.preventDefault();
      const title = $("notifyTitle").value.trim() || "Ba臒莽aTap bildiri艧i";
      const message = $("notifyMessage").value.trim();
      if (!message) { notifyStatus("Mesaj yaz."); return; }
      const res = await fetch(NOTIFICATION_API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          password: password(),
          title,
          message,
          active: $("notifyActive").value === "true"
        })
      });
      if (!res.ok) { notifyStatus("Bildiri艧 g枚nd蓹rilm蓹di. 艦ifr蓹ni yoxla."); return; }
      $("notifyTitle").value = "";
      $("notifyMessage").value = "";
      $("notifyActive").value = "true";
      notifyStatus("Bildiri艧 g枚nd蓹rildi. APK istifad蓹莽il蓹ri t蓹tbiq蓹 gir蓹nd蓹 g枚r蓹c蓹k.");
      await loadNotifications();
    }
    async function toggleNotification(id, active){
      const res = await fetch(`${NOTIFICATION_API}/${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ password: password(), active })
      });
      notifyStatus(res.ok ? "Bildiri艧 yenil蓹ndi." : "Bildiri艧 yenil蓹nm蓹di.");
      await loadNotifications();
    }
    async function deleteNotification(id){
      if (!confirm("Bu bildiri艧 silinsin?")) return;
      const res = await fetch(`${NOTIFICATION_API}/${encodeURIComponent(id)}?password=${encodeURIComponent(password())}`, { method:"DELETE" });
      notifyStatus(res.ok ? "Bildiri艧 silindi." : "Bildiri艧 silinm蓹di.");
      await loadNotifications();
    }
    async function loadNotifications(){
      const res = await fetch(`${NOTIFICATION_API}?password=${encodeURIComponent(password())}`, { cache:"no-store" });
      if (!res.ok) { notifyStatus("Bildiri艧l蓹r a莽谋lmad谋."); return; }
      notifications = await res.json();
      $("notificationsList").innerHTML = notifications.map(item => `
        <div class="item">
          <div class="notice-preview">
            <strong>${item.title}</strong>
            <span>${item.message}</span>
            <div class="meta">${item.createdAt || ""} ${item.active ? "路 Aktiv" : "路 Gizli"}</div>
          </div>
          <div class="row">
            <button class="secondary" type="button" onclick="toggleNotification('${item.id}', ${item.active ? "false" : "true"})">${item.active ? "Gizl蓹t" : "Aktiv et"}</button>
            <button class="danger" type="button" onclick="deleteNotification('${item.id}')">Sil</button>
          </div>
        </div>
      `).join("") || "<p>H蓹l蓹 bildiri艧 yoxdur.</p>";
    }
    async function loadItems(){
      const res = await fetch(`${API}?password=${encodeURIComponent(password())}`, { cache:"no-store" });
      if (!res.ok) { status("Siyah谋 a莽谋lmad谋. Serveri yoxlamaq laz谋md谋r."); return; }
      items = await res.json();
      $("list").innerHTML = items.map(item => `
        <div class="item">
          <div><strong>${item.name}</strong> ${item.featured ? '<span class="badge">Se莽ilmi艧</span>' : ''} ${item.active === false ? '<span class="badge">Gizli</span>' : ''}</div>
          <div class="meta">${item.district || ""} 路 ${item.price || ""}<br>${item.address || ""}</div>
          <div class="row">
            <button class="secondary" type="button" onclick="editItem('${item.id}')">D眉z蓹lt</button>
            <button class="danger" type="button" onclick="deleteItem('${item.id}')">Sil</button>
          </div>
        </div>
      `).join("") || "<p>H蓹l蓹 ba臒莽a yoxdur.</p>";
    }
    $("form").addEventListener("submit", saveItem);
    $("notifyForm").addEventListener("submit", sendNotification);
    $("resetBtn").addEventListener("click", clearForm);
    $("loadBtn").addEventListener("click", loadItems);
    $("loadNotificationsBtn").addEventListener("click", loadNotifications);
    $("address").addEventListener("input", scheduleAddressSearch);
    $("district").addEventListener("input", scheduleAddressSearch);
    $("findAddressBtn").addEventListener("click", () => findAddress(true));
    $("centerMapBtn").addEventListener("click", () => adminMap.setView(BAKU_CENTER, 11));
    $("lat").addEventListener("input", updateMarkerFromInputs);
    $("lng").addEventListener("input", updateMarkerFromInputs);
    initAdminMap();
    loadItems();
    loadNotifications();
  </script>
</body>
</html>
