<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restoran Admin Panel</title>
  <style>
    :root { --bg:#f6f1e8; --ink:#211611; --muted:#7b675c; --card:#fffaf2; --line:#ead9c4; --brand:#8b1e18; --brand2:#c98b2b; --green:#1f7a4d; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, Arial, sans-serif; background:var(--bg); color:var(--ink); }
    header { background:#1d130f; color:white; padding:18px 0; }
    .wrap { width:min(1050px, calc(100% - 28px)); margin:auto; }
    h1 { margin:0; font-size:28px; }
    .sub { margin:5px 0 0; color:#e8caa2; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0; }
    button, a { min-height:40px; border:0; border-radius:7px; padding:0 12px; font:inherit; font-weight:900; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .refresh { background:var(--brand); color:white; }
    .sound { background:var(--green); color:white; }
    .clear { background:white; color:var(--brand); border:1px solid var(--line); }
    .menu { background:var(--brand2); color:#211611; }
    .panel-button { background:white; color:var(--ink); border:1px solid var(--line); }
    .notice { display:none; margin:14px 0 0; padding:12px; border-radius:8px; background:#dff6e8; color:#145c38; font-weight:950; border:1px solid #a9dfbd; }
    .notice.show { display:block; }
    .utility-panels { display:grid; gap:12px; margin:12px 0 20px; }
    .utility-panel { display:none; }
    .utility-panel.open { display:grid; }
    .orders { display:grid; gap:12px; padding-bottom:28px; }
    .order { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px; box-shadow:0 10px 28px rgba(78,44,22,.08); }
    .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .table { font-size:24px; font-weight:950; color:var(--brand); }
    .status { border-radius:999px; background:#fff3d6; color:#6d4100; padding:7px 10px; font-weight:950; }
    .meta { color:var(--muted); margin-top:4px; }
    .items { margin:12px 0; padding:0; list-style:none; display:grid; gap:7px; }
    .items li { display:flex; justify-content:space-between; gap:10px; border-bottom:1px solid var(--line); padding-bottom:7px; }
    .total { display:flex; justify-content:space-between; font-size:20px; font-weight:950; background:#fff3d6; border-radius:7px; padding:10px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .prep { background:#fff3d6; color:#6d4100; }
    .done { background:var(--green); color:white; }
    .empty { background:white; border:1px dashed var(--line); border-radius:8px; padding:22px; color:var(--muted); font-weight:800; }
    .bill-title { margin:22px 0 12px; color:var(--brand); }
    .bills { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:12px; margin-bottom:24px; }
    .bill { background:white; border:2px solid #efd198; border-radius:8px; padding:14px; }
    .bill .table { font-size:22px; }
    .bill-time { color:var(--muted); font-weight:800; margin:4px 0 10px; line-height:1.35; }
    .close-bill { margin-top:10px; background:var(--brand); color:white; }
    .print-bill { margin-top:10px; margin-right:8px; background:var(--brand2); color:#211611; }
    .sales-panel { background:white; border:1px solid var(--line); border-radius:8px; padding:14px; margin:18px 0 6px; display:grid; gap:10px; }
    .sales-form { display:flex; gap:8px; flex-wrap:wrap; }
    .sales-form input { min-height:40px; border:1px solid var(--line); border-radius:7px; padding:0 12px; font:inherit; min-width:170px; }
    .sales-form button { background:var(--brand); color:white; }
    .sales-total { display:none; background:#fff3d6; border:1px solid #efd198; border-radius:8px; padding:12px; font-weight:950; font-size:20px; }
    .sales-error { color:var(--brand); font-weight:900; min-height:18px; }
    .menu-admin { background:white; border:1px solid var(--line); border-radius:8px; padding:14px; margin:18px 0 6px; display:grid; gap:10px; }
    .menu-form { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:8px; }
    .menu-form input, .menu-form select { min-height:40px; border:1px solid var(--line); border-radius:7px; padding:0 12px; font:inherit; }
    .menu-form label { display:grid; gap:5px; font-weight:850; color:var(--muted); }
    .menu-form input[type="file"] { padding:8px 10px; background:white; }
    .image-preview { display:none; width:100%; min-height:96px; border:1px dashed var(--line); border-radius:8px; background:center/cover no-repeat #fffaf2; }
    .image-preview.show { display:block; }
    .menu-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .menu-actions button { background:var(--brand); color:white; }
    .menu-list { display:grid; gap:8px; max-height:360px; overflow:auto; }
    .menu-row { display:grid; grid-template-columns:1fr auto; gap:8px; border:1px solid var(--line); border-radius:8px; padding:10px; background:#fffaf2; }
    .menu-row small { color:var(--muted); display:block; margin-top:3px; }
    .edit-menu { background:#fff3d6; color:#6d4100; }
    .delete-menu { background:var(--brand); color:white; }
    .hide { display:none; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Admin / Ofisiant Paneli</h1>
      <p class="sub">Masa sifarişləri burada görünür</p>
    </div>
  </header>
  <main class="wrap">
    <div class="toolbar">
      <button class="sound" id="sound">Səsi aktiv et</button>
      <button class="refresh" id="refresh">Yenilə</button>
      <button class="clear" id="clear">Sifarişləri təmizlə</button>
      <button class="panel-button" id="toggleMenuPanel">Menyu idarə et</button>
      <button class="panel-button" id="toggleSalesPanel">Günlük alver</button>
      <a class="menu" href="index.html">Menyuya qayıt</a>
    </div>
    <div class="notice" id="notice">Yeni sifariş gəldi</div>
    <div class="utility-panels">
      <section class="sales-panel utility-panel" id="salesPanel">
        <strong>Günlük alver</strong>
        <div class="sales-form">
          <input id="salesPassword" type="password" placeholder="Şifrə">
          <button id="showSales">Günlük alveri göstər</button>
        </div>
        <div class="sales-error" id="salesError"></div>
        <div class="sales-total" id="salesTotal"></div>
      </section>
      <section class="menu-admin utility-panel" id="menuPanel">
        <strong>Menyunu idarə et</strong>
        <div class="sales-form">
          <input id="menuPassword" type="password" placeholder="Şifrə">
          <button id="loadMenuAdmin">Menyunu aç</button>
        </div>
        <div class="sales-error" id="menuError"></div>
        <div id="menuEditor" class="hide">
          <input id="menuId" type="hidden">
          <div class="menu-form">
            <label>Yeməyin adı
              <input id="menuName" placeholder="Məsələn: Lülə kabab">
            </label>
            <label>Kateqoriya
              <select id="menuCategory"></select>
            </label>
            <label>Yeni kateqoriya
              <input id="menuCategoryNew" placeholder="Lazımdırsa yeni kateqoriya yaz">
            </label>
            <label>Qiymət
              <input id="menuPrice" type="number" step="0.01" placeholder="Qiymət">
            </label>
            <label>Qısa təsvir
              <input id="menuDesc" placeholder="Qısa təsvir">
            </label>
            <label>Şəkil linki
              <input id="menuImg" placeholder="Şəkil linki">
            </label>
            <label>Telefondan şəkil seç
              <input id="menuPhoto" type="file" accept="image/*">
            </label>
            <div class="image-preview" id="menuImagePreview"></div>
            <label><input id="menuActive" type="checkbox" checked> Menyuda görünsün</label>
          </div>
          <div class="menu-actions">
            <button id="saveMenuItem">Yadda saxla</button>
            <button id="newMenuItem">Yeni yemək</button>
          </div>
          <div class="menu-list" id="menuItems"></div>
        </div>
      </section>
    </div>
    <h2 class="bill-title">Masa hesabları</h2>
    <div class="bills" id="bills"></div>
    <h2 class="bill-title">Sifarişlər</h2>
    <div class="orders" id="orders"></div>
  </main>
  <script>
    const ordersEl = document.getElementById("orders");
    const billsEl = document.getElementById("bills");
    const notice = document.getElementById("notice");
    const salesTotal = document.getElementById("salesTotal");
    const salesError = document.getElementById("salesError");
    const menuError = document.getElementById("menuError");
    let soundEnabled = false;
    let lastNewestId = 0;
    let lastBills = [];
    let adminMenuItems = [];
    async function api(path, options){
      const res = await fetch(path, options);
      if(!res.ok) throw new Error("request failed");
      return res.json();
    }
    async function setStatus(id, status){
      await api(`/api/orders/${id}`, {method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify({status})});
      render();
    }
    async function closeBill(table){
      await api(`/api/bills/${encodeURIComponent(table)}`, {method:"DELETE"});
      render();
    }
    async function loadSales(){
      const password = document.getElementById("salesPassword").value.trim();
      salesError.textContent = "";
      salesTotal.style.display = "none";
      try {
        const data = await api(`/api/sales?password=${encodeURIComponent(password)}`);
        const history = data.byDate.length ? data.byDate.map(day => `
          <div style="display:flex;justify-content:space-between;gap:10px;border-top:1px solid #efd198;padding-top:8px;margin-top:8px;font-size:15px;">
            <span>${day.date}</span>
            <strong>${day.total} AZN / ${day.count} sifariş</strong>
          </div>
        `).join("") : "";
        salesTotal.innerHTML = `
          <div>Bugünkü cəm alver: ${data.todayTotal} AZN (${data.todayCount} tamamlanmış sifariş)</div>
          ${history}
        `;
        salesTotal.style.display = "block";
      } catch(e) {
        salesError.textContent = "Şifrə yanlışdır.";
      }
    }
    function menuPassword(){
      return document.getElementById("menuPassword").value.trim();
    }
    function togglePanel(id){
      const panel = document.getElementById(id);
      panel.classList.toggle("open");
    }
    function menuCategories(){
      return [...new Set(adminMenuItems.map(item => item.category).filter(Boolean))].sort((a, b) => a.localeCompare(b, "az"));
    }
    function renderCategoryOptions(selected = ""){
      const select = document.getElementById("menuCategory");
      const categories = menuCategories();
      select.innerHTML = categories.map(category => `<option value="${category}">${category}</option>`).join("");
      if(selected && !categories.includes(selected)){
        select.insertAdjacentHTML("afterbegin", `<option value="${selected}">${selected}</option>`);
      }
      select.value = selected || categories[0] || "";
    }
    function updateImagePreview(){
      const value = document.getElementById("menuImg").value.trim();
      const preview = document.getElementById("menuImagePreview");
      if(value){
        preview.style.backgroundImage = `url("${value}")`;
        preview.classList.add("show");
      } else {
        preview.style.backgroundImage = "";
        preview.classList.remove("show");
      }
    }
    function clearMenuForm(){
      document.getElementById("menuId").value = "";
      document.getElementById("menuName").value = "";
      renderCategoryOptions();
      document.getElementById("menuCategoryNew").value = "";
      document.getElementById("menuPrice").value = "";
      document.getElementById("menuDesc").value = "";
      document.getElementById("menuImg").value = "";
      document.getElementById("menuPhoto").value = "";
      document.getElementById("menuActive").checked = true;
      updateImagePreview();
    }
    function renderMenuAdmin(){
      const list = document.getElementById("menuItems");
      list.innerHTML = adminMenuItems.length ? adminMenuItems.map(item => `
        <div class="menu-row">
          <div>
            <strong>${item.name}</strong> <small>${item.category} / ${item.price} AZN / ${item.active === false ? "gizlidir" : "aktivdir"}</small>
            <small>${item.desc || ""}</small>
          </div>
          <div class="actions">
            <button class="edit-menu" onclick="editMenuItem('${item.id}')">Dəyiş</button>
            <button class="delete-menu" onclick="deleteMenuItem('${item.id}')">Sil</button>
          </div>
        </div>
      `).join("") : `<div class="empty">Menyuda məhsul yoxdur.</div>`;
    }
    async function loadMenuAdmin(){
      menuError.textContent = "";
      try {
        await api(`/api/sales?password=${encodeURIComponent(menuPassword())}`);
        adminMenuItems = await api("/api/menu");
        document.getElementById("menuEditor").classList.remove("hide");
        renderCategoryOptions();
        clearMenuForm();
        renderMenuAdmin();
      } catch(e) {
        menuError.textContent = "Şifrə yanlışdır.";
      }
    }
    function editMenuItem(id){
      const item = adminMenuItems.find(row => String(row.id) === String(id));
      if(!item) return;
      document.getElementById("menuId").value = item.id;
      document.getElementById("menuName").value = item.name || "";
      renderCategoryOptions(item.category || "");
      document.getElementById("menuCategoryNew").value = "";
      document.getElementById("menuPrice").value = item.price || 0;
      document.getElementById("menuDesc").value = item.desc || "";
      document.getElementById("menuImg").value = item.img || "";
      document.getElementById("menuPhoto").value = "";
      document.getElementById("menuActive").checked = item.active !== false;
      updateImagePreview();
      document.getElementById("menuName").focus();
    }
    async function saveMenuItem(){
      menuError.textContent = "";
      const id = document.getElementById("menuId").value;
      const newCategory = document.getElementById("menuCategoryNew").value.trim();
      const payload = {
        password: menuPassword(),
        name: document.getElementById("menuName").value.trim(),
        category: newCategory || document.getElementById("menuCategory").value.trim(),
        price: Number(document.getElementById("menuPrice").value || 0),
        desc: document.getElementById("menuDesc").value.trim(),
        img: document.getElementById("menuImg").value.trim(),
        active: document.getElementById("menuActive").checked,
      };
      if(!payload.name || !payload.category || !payload.price){
        menuError.textContent = "Ad, kateqoriya və qiymət yazılmalıdır.";
        return;
      }
      try {
        const path = id ? `/api/menu/${encodeURIComponent(id)}` : "/api/menu";
        const method = id ? "PATCH" : "POST";
        await api(path, {method, headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
        adminMenuItems = await api("/api/menu");
        renderCategoryOptions(payload.category);
        clearMenuForm();
        renderMenuAdmin();
        menuError.textContent = "Menyu yeniləndi.";
      } catch(e) {
        menuError.textContent = "Yadda saxlanmadı. Şifrəni yoxla.";
      }
    }
    async function deleteMenuItem(id){
      if(!confirm("Bu yemək menyudan silinsin?")) return;
      try {
        await api(`/api/menu/${encodeURIComponent(id)}?password=${encodeURIComponent(menuPassword())}`, {method:"DELETE"});
        adminMenuItems = await api("/api/menu");
        renderMenuAdmin();
      } catch(e) {
        menuError.textContent = "Silinmədi. Şifrəni yoxla.";
      }
    }
    function loadSelectedPhoto(file){
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        document.getElementById("menuImg").value = reader.result;
        updateImagePreview();
      };
      reader.readAsDataURL(file);
    }
    function receiptHtml(bill){
      const createdAt = new Date().toLocaleString("az-AZ", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
      const orderTimes = (bill.orders || []).map((order, index) => `
        <div>${index + 1}. sifariş: ${order.time}</div>
      `).join("");
      const rows = bill.items.map(item => `
        <tr>
          <td class="name">${item.name}</td>
          <td class="qty">${item.qty}</td>
          <td class="sum">${item.price * item.qty} AZN</td>
        </tr>
      `).join("");
      return `
        <!doctype html>
        <html>
        <head>
          <meta charset="utf-8">
          <title>Masa ${bill.table} çek</title>
          <style>
            @page { size: 80mm auto; margin: 4mm; }
            * { box-sizing: border-box; }
            body {
              width: 72mm;
              margin: 0 auto;
              padding: 0;
              color: #000;
              background: #fff;
              font-family: Arial, sans-serif;
              font-size: 12px;
            }
            .receipt { width: 100%; }
            h1 {
              margin: 0 0 4px;
              text-align: center;
              font-size: 17px;
              line-height: 1.2;
              font-weight: 800;
            }
            .meta {
              text-align: center;
              font-size: 11px;
              line-height: 1.35;
              padding-bottom: 8px;
              border-bottom: 1px dashed #000;
              margin-bottom: 8px;
            }
            .times {
              font-size: 11px;
              line-height: 1.35;
              padding-bottom: 8px;
              border-bottom: 1px dashed #000;
              margin-bottom: 8px;
            }
            table { width: 100%; border-collapse: collapse; }
            td {
              padding: 5px 0;
              border-bottom: 1px dashed #999;
              vertical-align: top;
            }
            .name { width: 54%; word-break: break-word; }
            .qty { width: 14%; text-align: center; white-space: nowrap; }
            .sum { width: 32%; text-align: right; white-space: nowrap; }
            .total {
              display: flex;
              justify-content: space-between;
              gap: 10px;
              margin-top: 10px;
              padding-top: 9px;
              border-top: 2px solid #000;
              font-size: 17px;
              font-weight: 800;
            }
            .thanks {
              text-align: center;
              margin-top: 12px;
              font-size: 11px;
            }
          </style>
        </head>
        <body>
          <div class="receipt">
            <h1>Restaurant Demo</h1>
            <div class="meta">Masa ${bill.table}<br>Çap vaxtı: ${createdAt}</div>
            <div class="times">
              <strong>Hesab vaxtı</strong><br>
              İlk sifariş: ${bill.firstTime || createdAt}<br>
              Son sifariş: ${bill.lastTime || createdAt}
              ${orderTimes}
            </div>
            <table>${rows}</table>
            <div class="total"><span>Cəmi</span><span>${bill.total} AZN</span></div>
            <div class="thanks">Təşəkkür edirik</div>
          </div>
        </body>
        </html>
      `;
    }
    function printBill(table){
      const bill = lastBills.find(item => String(item.table) === String(table));
      if(!bill) return;
      const frame = document.createElement("iframe");
      frame.style.position = "fixed";
      frame.style.right = "0";
      frame.style.bottom = "0";
      frame.style.width = "0";
      frame.style.height = "0";
      frame.style.border = "0";
      document.body.appendChild(frame);
      const doc = frame.contentWindow.document;
      doc.open();
      doc.write(receiptHtml(bill));
      doc.close();
      frame.onload = () => {
        frame.contentWindow.focus();
        frame.contentWindow.print();
        setTimeout(() => frame.remove(), 1200);
      };
    }
    function beep(){
      if(!soundEnabled) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      [0, 180, 360].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + delay / 1000);
        gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + delay / 1000 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay / 1000 + 0.14);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime + delay / 1000);
        osc.stop(ctx.currentTime + delay / 1000 + 0.16);
      });
    }
    function showNotice(){
      notice.classList.add("show");
      setTimeout(() => notice.classList.remove("show"), 6500);
    }
    async function render(){
      const [orders, billList] = await Promise.all([api("/api/orders"), api("/api/bills")]);
      lastBills = billList;
      const newestId = orders[0]?.id || 0;
      if(newestId > lastNewestId){
        lastNewestId = newestId;
        showNotice();
        beep();
      }
      billsEl.innerHTML = billList.length ? billList.map(bill => `
        <article class="bill">
          <div class="table">Masa ${bill.table}</div>
          <div class="bill-time">
            İlk sifariş: ${bill.firstTime || "-"}<br>
            Son sifariş: ${bill.lastTime || "-"}
          </div>
          <ul class="items">
            ${bill.items.map(item => `<li><span>${item.name} × ${item.qty}</span><strong>${item.price * item.qty} AZN</strong></li>`).join("")}
          </ul>
          <div class="total"><span>Hesab</span><span>${bill.total} AZN</span></div>
          <button class="print-bill" onclick="printBill('${bill.table}')">Soft çek çap et</button>
          <button class="close-bill" onclick="closeBill('${bill.table}')">Hesabı bağla</button>
        </article>
      `).join("") : `<div class="empty">Hələ masa hesabı yoxdur.</div>`;
      ordersEl.innerHTML = orders.length ? orders.map(order => `
        <article class="order">
          <div class="top">
            <div>
              <div class="table">Masa ${order.table}</div>
              <div class="meta">${order.time}</div>
            </div>
            <div class="status">${order.status}</div>
          </div>
          <ul class="items">
            ${order.items.map(item => `<li><span>${item.name} × ${item.qty}</span><strong>${item.price * item.qty} AZN</strong></li>`).join("")}
          </ul>
          <div class="total"><span>Cəmi</span><span>${order.total} AZN</span></div>
          <div class="actions">
            <button class="prep" onclick="setStatus(${order.id}, 'Hazırlanır')">Hazırlanır</button>
            <button class="done" onclick="setStatus(${order.id}, 'Tamamlandı')">${order.billed ? "Hesaba yazılıb" : "Tamamlandı"}</button>
          </div>
        </article>
      `).join("") : `<div class="empty">Hələ sifariş yoxdur.</div>`;
    }
    document.getElementById("sound").onclick = () => {
      soundEnabled = true;
      document.getElementById("sound").textContent = "Səs aktivdir";
      showNotice();
      beep();
    };
    document.getElementById("refresh").onclick = render;
    document.getElementById("clear").onclick = async () => { await api("/api/orders", {method:"DELETE"}); render(); };
    document.getElementById("toggleMenuPanel").onclick = () => togglePanel("menuPanel");
    document.getElementById("toggleSalesPanel").onclick = () => togglePanel("salesPanel");
    document.getElementById("showSales").onclick = loadSales;
    document.getElementById("loadMenuAdmin").onclick = loadMenuAdmin;
    document.getElementById("saveMenuItem").onclick = saveMenuItem;
    document.getElementById("newMenuItem").onclick = clearMenuForm;
    document.getElementById("menuImg").addEventListener("input", updateImagePreview);
    document.getElementById("menuPhoto").addEventListener("change", event => loadSelectedPhoto(event.target.files[0]));
    render();
    setInterval(render, 2500);
  </script>
</body>
</html>
