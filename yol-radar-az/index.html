<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Yol Radar AZ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f6;
      --panel: rgba(255, 255, 255, .94);
      --line: rgba(20, 32, 41, .10);
      --text: #17212b;
      --muted: #6f7c87;
      --green: #18b76b;
      --amber: #f6a90b;
      --red: #f04438;
      --blue: #1276f2;
      --shadow: 0 14px 34px rgba(21, 35, 48, .18);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    #map { position: fixed; inset: 0; z-index: 1; }
    .topbar {
      position: fixed; left: 10px; right: 10px; top: 10px; z-index: 5;
      display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px;
      padding: 8px; border: 1px solid var(--line); border-radius: 16px;
      background: var(--panel); backdrop-filter: blur(14px); box-shadow: var(--shadow);
    }
    .brand { min-width: 0; }
    .brand b { display: block; font-size: 15px; letter-spacing: .2px; }
    .brand b::before {
      content: "";
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(24,183,107,.16);
      vertical-align: 1px;
    }
    .brand span { display: block; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-left: 16px; }
    .speed {
      flex: 0 0 auto; display: grid; place-items: center; min-width: 66px; height: 44px; border-radius: 14px;
      border: 1px solid rgba(24,183,107,.24); background: #ecfff6; color: #0f3523; font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.65);
    }
    .speed strong { display: block; margin-top: 2px; font-size: 19px; line-height: 1; }
    .speed small { display: block; font-size: 9px; margin-top: 2px; color: #47725f; }
    .search {
      grid-column: 1 / -1;
      order: -1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .search input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(18, 118, 242, .16);
      border-radius: 14px;
      padding: 0 14px;
      font: inherit;
      color: var(--text);
      background: #f7fbff;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.75);
    }
    .search input:focus { border-color: rgba(18,118,242,.45); box-shadow: 0 0 0 4px rgba(18,118,242,.12); }
    .search input::placeholder { color: #7e8b96; }
    .search button { min-height: 46px; padding: 0 16px; background: var(--blue); color: #fff; }
    .results {
      grid-column: 1 / -1;
      display: none;
      gap: 6px;
      max-height: 170px;
      overflow: auto;
    }
    .results.open { display: grid; }
    .result {
      min-height: 38px;
      border: 1px solid rgba(20,32,41,.10);
      border-radius: 12px;
      padding: 8px 10px;
      color: var(--text);
      background: #fff;
      text-align: left;
      font-weight: 650;
    }
    .result small { display: block; margin-top: 2px; color: var(--muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .navcard {
      position: fixed;
      left: 10px;
      right: 10px;
      top: 150px;
      z-index: 4;
      display: none;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }
    .navcard.active { display: grid; }
    .arrow {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 13px;
      background: #101820;
      color: #fff;
      font-size: 24px;
      font-weight: 900;
    }
    .navtext b { display: block; font-size: 15px; line-height: 1.15; }
    .navtext span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
    .controls {
      position: fixed; left: 10px; right: 10px; bottom: 12px; z-index: 5;
      border: 1px solid var(--line); border-radius: 16px; background: var(--panel);
      backdrop-filter: blur(14px); box-shadow: var(--shadow);
      padding: 8px;
    }
    .controls.closed .grid { display: none; }
    .bar { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; }
    .bar b { font-size: 13px; }
    .bar span { display: block; color: var(--muted); font-size: 11px; margin-top: 1px; }
    .toggle { min-height: 38px; padding: 0 14px; background: #101820; color: #fff; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; margin-top: 8px; }
    button {
      min-height: 40px; border: 0; border-radius: 12px; padding: 8px 7px;
      font: inherit; font-weight: 760; color: #17212b; background: #eff4f8;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.58);
    }
    button:active { transform: scale(.98); }
    .camera { background: #fff1f0; color: #b42318; }
    .police { background: #eef6ff; color: #175cd3; }
    .jam { background: #fff7db; color: #9f5b00; }
    .crash { background: #fff2e5; color: #b54708; }
    .danger { background: #f4f0ff; color: #6941c6; }
    .locate { background: #eafaf2; color: #087443; }
    .layer { background: #edf4ff; color: #175cd3; }
    .status { margin: 7px 2px 0; color: var(--muted); font-size: 11px; line-height: 1.3; min-height: 15px; }
    .leaflet-control-attribution { font-size: 10px; }
    .pulse {
      width: 18px; height: 18px; border-radius: 50%; background: var(--blue);
      border: 3px solid white; box-shadow: 0 0 0 8px rgba(70,162,255,.22);
    }
    .pin {
      display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid white; box-shadow: 0 8px 20px rgba(0,0,0,.35); font-size: 18px;
    }
    .leaflet-control-zoom a {
      border: 0 !important;
      color: #17212b !important;
      background: rgba(255,255,255,.92) !important;
      box-shadow: 0 8px 20px rgba(21,35,48,.12);
    }
    @media (min-width: 720px) {
      .topbar { left: 24px; right: auto; width: 420px; }
      .navcard { left: 24px; right: auto; width: 420px; }
      .controls { left: 24px; right: auto; width: 420px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="topbar">
    <div class="brand">
      <b>Yol Radar AZ</b>
      <span>Waze tipli yol xəbərdarlıq demosu</span>
    </div>
    <div class="speed"><span><strong id="speed">0</strong><small>km/s</small></span></div>
    <form class="search" id="searchForm">
      <input id="destination" autocomplete="off" placeholder="Hara gedirsən? Məs: Gənclik Mall">
      <button type="submit">Get</button>
      <div class="results" id="results"></div>
    </form>
  </div>
  <div class="controls closed" id="controls">
    <div class="bar">
      <div>
        <b>Yol xəbərdarlığı</b>
        <span>Kamera, post, tıxac və təhlükə əlavə et</span>
      </div>
      <button class="toggle" id="toggleReports">Aç</button>
    </div>
    <div class="grid">
      <button class="camera" data-type="camera">Kamera</button>
      <button class="police" data-type="police">Post</button>
      <button class="jam" data-type="jam">Tıxac</button>
      <button class="crash" data-type="crash">Qəza</button>
      <button class="danger" data-type="danger">Təhlükə</button>
      <button class="locate" id="locate">Yerim</button>
      <button class="layer" id="layerBtn">Peyk</button>
    </div>
    <div class="status" id="status">GPS üçün icazə ver. Xəbərdarlıq əlavə etmək üçün xəritədə olduğun yeri götürür.</div>
  </div>
  <div class="navcard" id="navCard">
    <div class="arrow" id="navArrow">↑</div>
    <div class="navtext">
      <b id="navMain">Marşrut hazırdır</b>
      <span id="navSub">Hərəkət başlayanda növbəti göstəriş görünəcək</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const BAKU = [40.4093, 49.8671];
    const labels = {
      camera: ["Kamera", "📷", "#ff5f57"],
      police: ["Post", "🚓", "#46a2ff"],
      jam: ["Tıxac", "🚗", "#ffbf47"],
      crash: ["Qəza", "⚠️", "#ff9f43"],
      danger: ["Təhlükə", "!", "#8e7dff"]
    };
    const statusEl = document.getElementById("status");
    const speedEl = document.getElementById("speed");
    const navCard = document.getElementById("navCard");
    const navArrow = document.getElementById("navArrow");
    const navMain = document.getElementById("navMain");
    const navSub = document.getElementById("navSub");
    const map = L.map("map", { zoomControl: false }).setView(BAKU, 12);
    L.control.zoom({ position: "topright" }).addTo(map);
    const roadLayer = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap &copy; CARTO"
    });
    const satelliteLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19,
      attribution: "Tiles &copy; Esri"
    });
    roadLayer.addTo(map);

    let current = null;
    let userMarker = null;
    let userCircle = null;
    let destinationMarker = null;
    let routeLine = null;
    let satelliteMode = false;
    let routeSteps = [];
    let followMode = false;
    let lastInstruction = "";
    const markers = new Map();

    function setStatus(text) { statusEl.textContent = text; }
    function distanceMeters(a, b) {
      const R = 6371000;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
    }
    function formatDistance(meters) {
      if (meters < 80) return "indi";
      if (meters < 950) return `${Math.round(meters / 10) * 10} metr sonra`;
      return `${(meters / 1000).toFixed(meters > 9500 ? 0 : 1)} km sonra`;
    }
    function maneuverArrow(type, modifier) {
      if (type === "arrive") return "✓";
      if (modifier && modifier.includes("right")) return "↱";
      if (modifier && modifier.includes("left")) return "↰";
      if (modifier && modifier.includes("uturn")) return "↺";
      if (type === "roundabout" || type === "rotary") return "⟳";
      return "↑";
    }
    function maneuverText(step) {
      const maneuver = step.maneuver || {};
      const type = maneuver.type || "";
      const modifier = maneuver.modifier || "";
      const road = step.name ? ` (${step.name})` : "";
      if (type === "arrive") return "Çatdın";
      if (type === "depart") return `Düz get${road}`;
      if (type === "roundabout" || type === "rotary") return `Dairəyə daxil ol${road}`;
      if (modifier.includes("right")) return `Sağa dön${road}`;
      if (modifier.includes("left")) return `Sola dön${road}`;
      if (modifier.includes("straight")) return `Düz davam et${road}`;
      if (modifier.includes("uturn")) return "Geri dön";
      return `Davam et${road}`;
    }
    function updateNavigationInstruction() {
      if (!current || !routeSteps.length) return;
      let bestStep = routeSteps[0];
      let bestDistance = Infinity;
      for (const step of routeSteps) {
        const meters = distanceMeters(current, step.location);
        if (meters < bestDistance) {
          bestDistance = meters;
          bestStep = step;
        }
      }
      const main = `${formatDistance(bestDistance)} ${maneuverText(bestStep)}`;
      navCard.classList.add("active");
      navArrow.textContent = maneuverArrow(bestStep.type, bestStep.modifier);
      navMain.textContent = main;
      navSub.textContent = bestStep.name ? `Yol: ${bestStep.name}` : "Xəritə sənin yerini izləyir";
      if (main !== lastInstruction && bestDistance < 250) {
        lastInstruction = main;
        if ("speechSynthesis" in window) {
          speechSynthesis.cancel();
          speechSynthesis.speak(new SpeechSynthesisUtterance(main));
        }
      }
    }
    function markerIcon(type) {
      const item = labels[type] || labels.danger;
      return L.divIcon({
        className: "",
        html: `<div class="pin" style="background:${item[2]}">${item[1]}</div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 17]
      });
    }
    function userIcon() {
      return L.divIcon({ className: "", html: '<div class="pulse"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
    }
    function saveAlerts(alerts) {
      localStorage.setItem("yolRadarAzAlerts", JSON.stringify(alerts.slice(-100)));
    }
    function loadAlerts() {
      try { return JSON.parse(localStorage.getItem("yolRadarAzAlerts") || "[]"); }
      catch { return []; }
    }
    function renderAlert(alert) {
      if (markers.has(alert.id)) return;
      const label = labels[alert.type] || labels.danger;
      const marker = L.marker([alert.lat, alert.lng], { icon: markerIcon(alert.type) })
        .addTo(map)
        .bindPopup(`<b>${label[0]}</b><br>${new Date(alert.createdAt).toLocaleString("az-AZ")}`);
      markers.set(alert.id, marker);
    }
    function azQueryVariants(query) {
      const raw = query.trim();
      const lower = raw.toLocaleLowerCase("az");
      const replacements = [
        ["genclik", "gənclik"], ["ganclik", "gənclik"],
        ["nesimi", "nəsimi"], ["nerimanov", "nərimanov"],
        ["xetai", "xətai"], ["ehmedli", "əhmədli"],
        ["azadliq", "azadlıq"], ["inqilab", "həsən əliyev"],
        ["sumqayit", "sumqayıt"], ["insaatcilar", "inşaatçılar"],
        ["elmler", "elmlər"], ["bakixanov", "bakıxanov"]
      ];
      let fixed = lower;
      replacements.forEach(([from, to]) => { fixed = fixed.replaceAll(from, to); });
      return [...new Set([
        raw,
        fixed,
        `${raw} Bakı`,
        `${fixed} Bakı`,
        `${raw} Azerbaijan`,
        `${fixed} Azərbaycan`
      ].filter(Boolean))];
    }
    function shortName(place) {
      return place.name || place.display_name?.split(",")[0] || "Yer";
    }
    async function findDestinations(query) {
      const seen = new Set();
      const output = [];
      for (const variant of azQueryVariants(query)) {
        const url = new URL("https://nominatim.openstreetmap.org/search");
        url.searchParams.set("format", "json");
        url.searchParams.set("limit", "5");
        url.searchParams.set("countrycodes", "az");
        url.searchParams.set("q", variant);
        const response = await fetch(url.toString(), { headers: { "Accept": "application/json" } });
        const places = await response.json();
        places.forEach(place => {
          const key = `${place.lat},${place.lon}`;
          if (seen.has(key)) return;
          seen.add(key);
          output.push({
            name: shortName(place),
            displayName: place.display_name,
            lat: Number(place.lat),
            lng: Number(place.lon)
          });
        });
        if (output.length >= 5) break;
      }
      if (output.length) return output.slice(0, 5);
      const photon = new URL("https://photon.komoot.io/api/");
      photon.searchParams.set("q", `${query} Bakı`);
      photon.searchParams.set("limit", "5");
      photon.searchParams.set("lat", "40.4093");
      photon.searchParams.set("lon", "49.8671");
      const response = await fetch(photon.toString());
      const data = await response.json();
      return (data.features || []).filter(item => item.properties?.countrycode === "AZ").slice(0, 5).map(item => ({
        name: item.properties.name || item.properties.street || "Yer",
        displayName: [item.properties.name, item.properties.street, item.properties.district, item.properties.city].filter(Boolean).join(", "),
        lat: item.geometry.coordinates[1],
        lng: item.geometry.coordinates[0]
      }));
    }
    function showResults(places) {
      const results = document.getElementById("results");
      results.innerHTML = "";
      places.forEach(place => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "result";
        button.innerHTML = `${place.name}<small>${place.displayName || ""}</small>`;
        button.addEventListener("click", () => chooseDestination(place));
        results.appendChild(button);
      });
      results.classList.toggle("open", places.length > 1);
    }
    async function chooseDestination(destination) {
      document.getElementById("results").classList.remove("open");
      document.getElementById("destination").value = destination.name;
      if (destinationMarker) destinationMarker.remove();
      destinationMarker = L.marker([destination.lat, destination.lng], { icon: markerIcon("danger") })
        .addTo(map)
        .bindPopup(`<b>Gediləcək yer</b><br>${destination.displayName || destination.name}`)
        .openPopup();
      await drawRoute(destination);
    }
    async function findDestination(query) {
      const url = new URL("https://nominatim.openstreetmap.org/search");
      url.searchParams.set("format", "json");
      url.searchParams.set("limit", "1");
      url.searchParams.set("countrycodes", "az");
      url.searchParams.set("q", query);
      const response = await fetch(url.toString(), { headers: { "Accept": "application/json" } });
      const places = await response.json();
      if (!places.length) return null;
      return {
        name: places[0].display_name,
        lat: Number(places[0].lat),
        lng: Number(places[0].lon)
      };
    }
    async function drawRoute(destination) {
      if (!current) {
        setStatus("Marşrut üçün əvvəl GPS yerini tapmaq lazımdır.");
        return;
      }
      const url = `https://router.project-osrm.org/route/v1/driving/${current.lng},${current.lat};${destination.lng},${destination.lat}?overview=full&geometries=geojson&steps=true`;
      const response = await fetch(url);
      const data = await response.json();
      if (!data.routes || !data.routes.length) {
        setStatus("Bu istiqamət üçün yol tapılmadı.");
        return;
      }
      const route = data.routes[0];
      const coords = route.geometry.coordinates.map(point => [point[1], point[0]]);
      if (routeLine) routeLine.remove();
      routeLine = L.polyline(coords, { color: "#33d17a", weight: 6, opacity: .86 }).addTo(map);
      routeSteps = (route.legs?.[0]?.steps || []).map(step => ({
        name: step.name,
        type: step.maneuver?.type || "",
        modifier: step.maneuver?.modifier || "",
        location: { lng: step.maneuver.location[0], lat: step.maneuver.location[1] },
        maneuver: step.maneuver
      }));
      followMode = true;
      map.setView([current.lat, current.lng], 17);
      const km = (route.distance / 1000).toFixed(route.distance > 10000 ? 0 : 1);
      const min = Math.round(route.duration / 60);
      setStatus(`${destination.name.split(",")[0]}: ${km} km, təxminən ${min} dəq.`);
      updateNavigationInstruction();
    }
    async function searchDestination(event) {
      event.preventDefault();
      const input = document.getElementById("destination");
      const query = input.value.trim();
      if (!query) return;
      setStatus("Ünvan axtarılır...");
      try {
        const places = await findDestinations(query);
        if (!places.length) {
          setStatus("Yer tapılmadı. Bir az daha dəqiq yaz.");
          return;
        }
        showResults(places);
        await chooseDestination(places[0]);
        if (places.length > 1) {
          setStatus("Bir neçə yer tapıldı. Lazım olanı siyahıdan seç.");
          document.getElementById("results").classList.add("open");
        }
      } catch (error) {
        setStatus("Axtarış alınmadı. İnternet bağlantısını yoxla.");
      }
    }
    function addAlert(type) {
      if (!current) {
        setStatus("Əvvəl GPS yerini tapmaq lazımdır. Telefon brauzerində yer icazəsi ver.");
        return;
      }
      const alerts = loadAlerts();
      const alert = { id: String(Date.now()), type, lat: current.lat, lng: current.lng, createdAt: new Date().toISOString() };
      alerts.push(alert);
      saveAlerts(alerts);
      renderAlert(alert);
      const label = labels[type][0];
      setStatus(label + " əlavə olundu. Bu demo versiyada işarələr həmin telefonda saxlanır.");
    }
    function updatePosition(pos) {
      const { latitude, longitude, accuracy, speed } = pos.coords;
      current = { lat: latitude, lng: longitude };
      const kmh = Math.max(0, Math.round((speed || 0) * 3.6));
      speedEl.textContent = String(kmh);
      if (!userMarker) {
        userMarker = L.marker([latitude, longitude], { icon: userIcon() }).addTo(map);
        userCircle = L.circle([latitude, longitude], { radius: accuracy || 30, color: "#46a2ff", fillColor: "#46a2ff", fillOpacity: .12, weight: 1 }).addTo(map);
        map.setView([latitude, longitude], 15);
      } else {
        userMarker.setLatLng([latitude, longitude]);
        userCircle.setLatLng([latitude, longitude]);
        userCircle.setRadius(accuracy || 30);
      }
      if (followMode) {
        map.setView([latitude, longitude], Math.max(map.getZoom(), 17), { animate: true });
        updateNavigationInstruction();
      } else {
        setStatus("GPS aktivdir. Sürət və yer xəritədə görünür.");
      }
    }
    function startGps() {
      if (!navigator.geolocation) {
        setStatus("Bu brauzerdə GPS dəstəyi yoxdur.");
        return;
      }
      navigator.geolocation.watchPosition(updatePosition, () => {
        setStatus("GPS icazəsi verilmədi. Brauzerdə location icazəsini aç.");
      }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
    }
    document.querySelectorAll("button[data-type]").forEach(btn => {
      btn.addEventListener("click", () => addAlert(btn.dataset.type));
    });
    document.getElementById("searchForm").addEventListener("submit", searchDestination);
    document.getElementById("toggleReports").addEventListener("click", event => {
      event.preventDefault();
      const controls = document.getElementById("controls");
      controls.classList.toggle("closed");
      event.currentTarget.textContent = controls.classList.contains("closed") ? "Aç" : "Bağla";
    });
    document.getElementById("layerBtn").addEventListener("click", event => {
      event.preventDefault();
      satelliteMode = !satelliteMode;
      if (satelliteMode) {
        roadLayer.remove();
        satelliteLayer.addTo(map);
        event.currentTarget.textContent = "Xəritə";
        setStatus("Peyk görünüşü aktivdir.");
      } else {
        satelliteLayer.remove();
        roadLayer.addTo(map);
        event.currentTarget.textContent = "Peyk";
        setStatus("Təmiz yol xəritəsi aktivdir.");
      }
    });
    document.getElementById("locate").addEventListener("click", () => {
      if (current) {
        followMode = true;
        map.setView([current.lat, current.lng], 17);
      }
      else startGps();
    });
    loadAlerts().forEach(renderAlert);
    startGps();
  </script>
</body>
</html>
